<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex Nacional</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>Pokédex <span>Nacional</span></h1>
    <p>Os 809 Pokémon de Kanto a Alola (Gerações I a VII — Nº 1 a 809)</p>
  </header>

  <div class="controls">
    <input
      type="search"
      id="search"
      placeholder="Buscar por nome ou número..."
      autocomplete="off"
      aria-label="Buscar Pokémon"
    />
    <button id="open-compare" class="compare-btn">⚔️ Comparar Pokémon</button>
    <div id="region-filters" class="region-filters" role="group" aria-label="Filtrar por região"></div>
    <div id="type-filters" class="type-filters" role="group" aria-label="Filtrar por tipo"></div>
  </div>

  <main>
    <p id="count" class="count" aria-live="polite"></p>
    <ul id="grid" class="grid"></ul>
    <p id="empty" class="empty" hidden>Nenhum Pokémon encontrado.</p>
  </main>

  <footer>
    <p>Dados e sprites de <a href="https://pokeapi.co" target="_blank" rel="noopener">PokeAPI</a>. Pokémon © Nintendo / Game Freak.</p>
  </footer>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-name">
      <button class="modal-close" data-close aria-label="Fechar">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="compare" class="modal" hidden>
    <div class="modal-backdrop" data-close-compare></div>
    <div class="modal-card compare-card" role="dialog" aria-modal="true" aria-label="Comparar Pokémon">
      <button class="modal-close" data-close-compare aria-label="Fechar">&times;</button>
      <h2 class="compare-title">⚔️ Comparar Pokémon</h2>
      <div class="compare-selectors">
        <input id="sel-a" class="poke-input" list="poke-list" autocomplete="off"
               placeholder="Digite ou escolha..." aria-label="Primeiro Pokémon" />
        <span class="vs-label">VS</span>
        <input id="sel-b" class="poke-input" list="poke-list" autocomplete="off"
               placeholder="Digite ou escolha..." aria-label="Segundo Pokémon" />
      </div>
      <datalist id="poke-list"></datalist>
      <div id="compare-body"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
